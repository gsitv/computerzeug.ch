<line x1="113" y1="92" x2="106" y2="99" stroke="#3a2a00" stroke-width="2.8" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(58, 42, 0);color:rgb(0, 0, 0);stroke-width:2.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="127" y1="92" x2="134" y2="99" stroke="#3a2a00" stroke-width="2.8" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(58, 42, 0);color:rgb(0, 0, 0);stroke-width:2.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="134" y1="92" x2="127" y2="99" stroke="#3a2a00" stroke-width="2.8" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(58, 42, 0);color:rgb(0, 0, 0);stroke-width:2.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Squiggly mouth -->
<path d="M108 114 Q115 121 120 114 Q125 107 132 114" fill="none" stroke="#3a2a00" stroke-width="2.2" stroke-linecap="round" style="fill:none;stroke:rgb(58, 42, 0);color:rgb(0, 0, 0);stroke-width:2.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Sweat drop -->
<ellipse cx="142" cy="90" rx="3.5" ry="5" style="fill:rgb(55, 138, 221);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Error bar -->
