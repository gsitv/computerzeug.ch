<!-- ── MONITOR ICON ── centered around x=120 -->
<!-- Body -->
<rect x="44" y="48" width="152" height="108" rx="10" stroke-width="1.5" style="fill:rgb(216, 216, 216);stroke:rgb(153, 153, 153);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Screen -->
<rect x="56" y="58" width="128" height="88" rx="5" style="fill:rgb(221, 238, 221);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Face on screen -->
